# Configuration for daily_arxiv.py
#
# `keywords` maps a section title (shown as the heading + table-of-contents entry
# in the generated README) to an arXiv query string. arXiv query syntax supports
# AND / OR / ANDNOT, quoted phrases, and parentheses for grouping. Add / remove a
# line here to change the tracked topics — no code change needed. Section order in
# the generated feed follows the order of this file.
#
# `max_results` is how many of the most-recently-submitted papers to fetch per
# topic on each run. New papers are merged into the accumulated history, so this
# is a per-run window, not a cap on the total list.

max_results: 10

keywords:

  # --- General & sensor modality -------------------------------------------
  SLAM: "SLAM"

  "Visual SLAM / VO": >-
    "visual SLAM" OR "visual odometry" OR "monocular SLAM" OR "stereo SLAM"
    OR "RGB-D SLAM"

  "LiDAR SLAM": >-
    "LiDAR SLAM" OR "LiDAR odometry" OR "LiDAR-inertial" OR "laser SLAM"
    OR "lidar-based SLAM"

  "Visual-Inertial SLAM": >-
    "visual-inertial odometry" OR "visual-inertial SLAM" OR "VIO"
    OR "visual inertial navigation"

  # --- Problem type ---------------------------------------------------------
  "Semantic SLAM": >-
    "semantic SLAM" OR "object SLAM" OR "object-level SLAM"
    OR ("semantic mapping" AND SLAM)

  "Dynamic SLAM": >-
    "dynamic SLAM" OR ("dynamic environment" AND (SLAM OR "visual odometry"))
    OR ("moving objects" AND SLAM)

  "Active SLAM": >-
    "active SLAM" OR ("active mapping" AND (SLAM OR robot OR exploration))
    OR ("active perception" AND (SLAM OR robot))
    OR ("autonomous exploration" AND (SLAM OR mapping OR robot))

  "Continual / Lifelong SLAM": >-
    "lifelong SLAM" OR "continual SLAM" OR "long-term SLAM"
    OR "lifelong localization" OR "lifelong mapping"

  "Collaborative / Multi-Robot SLAM": >-
    "collaborative SLAM" OR "multi-robot SLAM" OR "multi-agent SLAM"
    OR "distributed SLAM" OR "swarm SLAM"

  # --- Modern representations -----------------------------------------------
  "Gaussian Splatting SLAM": >-
    "Gaussian Splatting SLAM" OR "GS-SLAM" OR "Gaussian SLAM"
    OR (("Gaussian Splatting" OR "3D Gaussian") AND (SLAM OR "visual odometry"))

  # Foundation models + Vision-Language-Action / Vision-Language models applied
  # to SLAM, navigation and embodied robotics. Anchored on robotics terms so it
  # does not pull in generic vision/LLM papers.
  "Foundation-SLAM (VLA/VLM)": >-
    ("vision-language-action" OR "vision language action" OR "VLA model" OR
    "vision-and-language navigation" OR "vision-language navigation" OR
    "foundation model" OR "large language model" OR "vision-language model") AND
    (SLAM OR "visual odometry" OR "robot navigation" OR "autonomous navigation"
    OR "embodied navigation" OR "embodied agent" OR manipulation OR robotic)

  "NeRF / Implicit SLAM": >-
    ("NeRF" OR "neural radiance field" OR "neural implicit"
    OR "implicit neural representation") AND
    (SLAM OR "visual odometry" OR mapping OR reconstruction)

  # --- Related computer-vision topics ---------------------------------------
  SFM: 'SFM OR "Structure from Motion"'

  "Visual Localization": >-
    "Camera Localization" OR "Visual Localization" OR "Camera Re-localisation"
    OR "Loop Closure Detection" OR "visual place recognition" OR "image retrieval"

  "Keypoint Detection": '"Keypoint Detection" OR "Feature Descriptor"'

  "Image Matching": '"Image Matching" OR "Keypoint Matching"'
